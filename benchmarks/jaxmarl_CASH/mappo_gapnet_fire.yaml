# ADD to baselines/MAPPO/configs
LR: 2e-3
ANNEAL_LR: True
NUM_ENVS: 16
TOTAL_TIMESTEPS: 10e6
FC_DIM_SIZE: 64
GRU_HIDDEN_DIM: 64
UPDATE_EPOCHS: 4
NUM_MINIBATCHES: 4
GAMMA: 0.99
GAE_LAMBDA: 0.95
CLIP_EPS: 0.2
SCALE_CLIP_EPS: False
ENT_COEF: 0.01
VF_COEF: 0.5
MAX_GRAD_NORM: 0.5

AGENT_INIT_SCALE: 2.
AGENT_RECURRENT: True

# --- GapNet-specific ---
AGENT_HYPERAWARE: True  # must be True for GapNet
AGENT_ARCH: "gapnet"    # NEW: selects ActorGapHyperRNN

# GapNet params
GAP_FUNC_DIM: 8         # phi output / gap vector dimension
GAP_PHI_HIDDEN: 64      # phi MLP hidden width

# Hypernetwork for the decoder (same keys as CASH)
AGENT_HYPERNET_KWARGS:
  HIDDEN_DIM: 16
  INIT_SCALE: 0.2
  USE_LAYER_NORM: True
  NUM_LAYERS: 4

ENV_NAME: MPE_simple_fire
ENV_KWARGS:
  max_steps: 50

  fire_rad_range: [0.2, 0.3]

  # reward shaping
  fire_out_reward: 0.5
  uncovered_penalty_factor: 1
  pos_shaping_factor: 0.01

  # capabilities
  capability_aware: True
  num_capabilities: 2
  num_agents: 3
  num_landmarks: 2

  agent_rads: [0.3, 0.2, 0.1, 0.1, 0.2]
  agent_accels: [1, 2, 3, 3, 2]

  test_teams:
    [[0.09, 3.43, 0.21, 2.94, 0.42, 0.75],
    [0.09, 3.41, 0.21, 3.,   0.48, 0.63],
    [0.05, 3.46, 0.25, 2.76, 0.44, 0.6 ],
    [0.08, 3.23, 0.23, 2.8,  0.5,  0.61],
    [0.09, 3.14, 0.21, 1.16, 0.47, 0.86],
    [0.06, 3.45, 0.24, 2.08, 0.46, 0.76],
    [0.08, 3.06, 0.22, 1.08, 0.48, 0.56],
    [0.07, 3.04, 0.23, 2.37, 0.45, 0.56],
    [0.09, 3.36, 0.21, 2.2,  0.49, 0.64],
    [0.09, 3.26, 0.21, 2.59, 0.47, 0.64]]

SEED: 76
NUM_SEEDS: 10

# WandB
ENTITY: ""
PROJECT: GapNet-JaxMARL
WANDB_MODE: offline

SAVE_PATH: baselines/MAPPO/checkpoints
VISUALIZE_FINAL_POLICY: False
VIZ_NUM_ENVS: 3
